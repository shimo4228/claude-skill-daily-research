[general]
vault_path = "/path/to/your/obsidian/vault"
output_dir = "daily-research"
language = "ja"
date_format = "%Y-%m-%d"

[report]
min_sources = 5

[tracks.tech]
name = "Tech Trends"
focus = "Developer technology trends. New tools, frameworks, AI, OSS"
sources = [
  "Hacker News top stories",
  "GitHub Trending (past 7 days)",
  "TechCrunch AI/Apps category",
  "arXiv cs.AI, cs.CL, cs.SE new papers",
]
scoring_criteria = [
  { name = "Novelty", weight = 30, desc = "No similar theme in past_topics.json" },
  { name = "Momentum", weight = 25, desc = "An actively evolving area, not static knowledge" },
  { name = "Buildability", weight = 25, desc = "Could build something with Python/Swift/TypeScript" },
  { name = "Whisper trend", weight = 20, desc = "A change not yet widely noticed" },
]

[tracks.personal]
name = "Personal Interests"
focus = "Embodied cognition, Buddhist studies, Free Energy Principle, and contemplative science"
sources = [
  "Semantic Scholar (embodied cognition, mindfulness, free energy principle)",
  "arXiv q-bio.NC, nlin.AO new papers",
  "Lion's Roar latest",
  "Tricycle latest",
  "Mindful Magazine latest",
]
domains = ["Embodied Cognition", "Buddhism", "Meditation", "Mindfulness", "Free Energy Principle", "Predictive Processing", "Active Inference"]
scoring_criteria = [
  { name = "Novelty", weight = 25, desc = "No similar theme in past_topics.json" },
  { name = "Momentum", weight = 20, desc = "An actively evolving area, not static knowledge" },
  { name = "Buildability", weight = 20, desc = "Could build something with Python/Swift/TypeScript" },
  { name = "Whisper trend", weight = 15, desc = "A change not yet widely noticed" },
  { name = "Tech x Body intersection", weight = 20, desc = "Intersection of technology and embodiment" },
]

[tracks.ai_dev]
name = "AI-Era Developer Strategy"
focus = "AI search optimization (AIO/GEO) and developer authenticity. Content design for LLM discoverability, personal branding in the AI era, Contemplative AI agent design, and AKC (Agent Knowledge Cycle) practice and evolution"
context = """\
User's own projects. When selecting themes or researching, WebFetch each repo's README for current state.

- Contemplative-agent: https://github.com/shimo4228/contemplative-agent-rules
  Applies CCAI clauses (Laukkonen et al. 2025) to AI agent design
- Contemplative-agent data: https://github.com/shimo4228/contemplative-agent-data
- AKC (Agent Knowledge Cycle): https://github.com/shimo4228/agent-knowledge-cycle
  6-phase knowledge lifecycle framework for AI agents\
"""
sources = [
  "Hacker News (AI search, LLM, developer branding)",
  "arXiv cs.IR, cs.AI new papers (generative engine optimization, retrieval)",
  "Google Search Central Blog / Search Engine Journal",
  "IndieHackers / Dev.to (developer authenticity, personal branding)",
  "Semantic Scholar (contemplative AI, AI alignment, knowledge management)",
]
domains = [
  "AI Search Optimization", "AIO", "GEO (Generative Engine Optimization)",
  "LLM Search", "RAG", "Content Strategy",
  "Developer Authenticity", "Personal Branding",
  "Contemplative AI", "Contemplative-agent",
  "AKC (Agent Knowledge Cycle)", "Agent Knowledge Management",
  "AI Alignment", "Constitutional AI",
]
scoring_criteria = [
  { name = "Novelty", weight = 25, desc = "No similar theme in past_topics.json" },
  { name = "Momentum", weight = 25, desc = "An actively evolving technology, market, or discussion right now" },
  { name = "Contemplative/AKC applicability", weight = 25, desc = "Can be applied to Contemplative-agent or AKC design and improvement" },
  { name = "Buildability", weight = 15, desc = "Could build something with Python/Swift/TypeScript" },
  { name = "Whisper trend", weight = 10, desc = "A change not yet noticed by most developers" },
]

[user_profile]
skills = ["Python", "Swift", "TypeScript", "iOS development"]
interests = ["AI/ML", "Agents", "Embodied Cognition", "Buddhism", "Meditation", "Free Energy Principle"]
goal = "Discover ideas for the next development project to build"
