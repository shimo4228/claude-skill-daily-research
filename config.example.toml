[general]
vault_path = "/path/to/your/obsidian/vault"
output_dir = "daily-research"
language = "ja"
date_format = "%Y-%m-%d"

[report]
min_sources = 5

[tracks.tech]
name = "Tech Trends"
focus = "Developer technology trends. New tools, frameworks, AI, OSS"
sources = [
  "Hacker News top stories",
  "GitHub Trending (past 7 days)",
  "TechCrunch AI/Apps category",
  "arXiv cs.AI, cs.CL, cs.SE new papers",
]
scoring_criteria = [
  { name = "Novelty", weight = 30, desc = "No similar theme in past_topics.json" },
  { name = "Momentum", weight = 25, desc = "An actively evolving area, not static knowledge" },
  { name = "Buildability", weight = 25, desc = "Could build something with Python/Swift/TypeScript" },
  { name = "Whisper trend", weight = 20, desc = "A change not yet widely noticed" },
]

[tracks.personal]
name = "Personal Interests"
focus = "Embodied cognition, Buddhist studies, Free Energy Principle, and contemplative science"
sources = [
  "Semantic Scholar (embodied cognition, mindfulness, free energy principle)",
  "arXiv q-bio.NC, nlin.AO new papers",
  "Lion's Roar latest",
  "Tricycle latest",
  "Mindful Magazine latest",
]
domains = ["Embodied Cognition", "Buddhism", "Meditation", "Mindfulness", "Free Energy Principle", "Predictive Processing", "Active Inference"]
scoring_criteria = [
  { name = "Novelty", weight = 25, desc = "No similar theme in past_topics.json" },
  { name = "Momentum", weight = 20, desc = "An actively evolving area, not static knowledge" },
  { name = "Buildability", weight = 20, desc = "Could build something with Python/Swift/TypeScript" },
  { name = "Whisper trend", weight = 15, desc = "A change not yet widely noticed" },
  { name = "Tech x Body intersection", weight = 20, desc = "Intersection of technology and embodiment" },
]

[tracks.social]
name = "社会課題 x Tech"
focus = "テクノロジーで解決可能な社会的課題。シビックテック、デジタル包摂、健康格差、気候変動、教育アクセス"
sources = [
  "Stanford Social Innovation Review 最新記事",
  "MIT Technology Review (social impact, climate, health)",
  "Code for Japan / Code for America ブログ",
  "デジタル庁 プレスリリース",
  "arXiv cs.CY (Computers and Society) 新着",
]
domains = [
  "Civic Tech", "Digital Inclusion", "Health Equity",
  "Climate Tech", "Education Technology",
  "Disaster Preparedness", "Aging Society", "Accessibility",
]
scoring_criteria = [
  { name = "Novelty", weight = 20, desc = "No similar theme in past_topics.json" },
  { name = "Social urgency", weight = 25, desc = "A pressing problem affecting many people" },
  { name = "Tech solvability", weight = 25, desc = "Technology can make a concrete difference" },
  { name = "Buildability", weight = 20, desc = "Could build with Python/Swift/TypeScript/iOS" },
  { name = "Whisper trend", weight = 10, desc = "An emerging tech x social intersection not yet widely explored" },
]

[user_profile]
skills = ["Python", "Swift", "TypeScript", "iOS development"]
interests = ["AI/ML", "Agents", "Embodied Cognition", "Buddhism", "Meditation", "Free Energy Principle"]
goal = "Discover ideas for the next development project to build"
